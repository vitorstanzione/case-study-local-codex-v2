<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ecommerce Dashboard</title>
    <style>
      :root {
        --bg: #e8f1ff;
        --surface: #ffffff;
        --text: #0f2b5b;
        --muted: #4a6699;
        --primary: #1769ff;
        --primary-hover: #0f57de;
        --overlay: rgba(2, 17, 40, 0.55);
      }

      :root[data-theme='dark'] {
        --bg: #0b1530;
        --surface: #142347;
        --text: #eaf0ff;
        --muted: #b8c8f0;
        --primary: #5c94ff;
        --primary-hover: #7aa8ff;
        --overlay: rgba(0, 0, 0, 0.7);
      }

      :root[data-theme='light'] {
        --bg: #e8f1ff;
        --surface: #ffffff;
        --text: #0f2b5b;
        --muted: #4a6699;
        --primary: #1769ff;
        --primary-hover: #0f57de;
        --overlay: rgba(2, 17, 40, 0.55);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: Inter, Segoe UI, Roboto, Arial, sans-serif;
        background: linear-gradient(140deg, var(--bg), color-mix(in srgb, var(--bg) 65%, #9ec2ff));
        color: var(--text);
        display: grid;
        place-items: center;
        padding: 1.5rem;
      }

      .card {
        width: min(900px, 100%);
        background: color-mix(in srgb, var(--surface) 90%, transparent);
        border: 1px solid color-mix(in srgb, var(--primary) 24%, transparent);
        border-radius: 18px;
        padding: 2rem;
        box-shadow: 0 24px 60px -30px rgba(23, 105, 255, 0.6);
      }

      h1 {
        margin: 0 0 0.75rem;
      }

      p {
        margin: 0;
        color: var(--muted);
        line-height: 1.55;
      }

      .actions {
        margin-top: 1.5rem;
      }

      button {
        border: 0;
        border-radius: 12px;
        padding: 0.7rem 1rem;
        font-size: 0.95rem;
        font-weight: 600;
        cursor: pointer;
      }

      .about-btn,
      .theme-btn {
        background: var(--primary);
        color: white;
      }

      .about-btn:hover,
      .theme-btn:hover {
        background: var(--primary-hover);
      }

      .chart {
        margin-top: 1rem;
        display: grid;
        gap: 0.75rem;
      }

      .chart-grid {
        margin-top: 1rem;
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
        gap: 0.9rem;
      }

      .chart-card {
        background: color-mix(in srgb, var(--surface) 92%, var(--bg));
        border: 1px solid color-mix(in srgb, var(--primary) 20%, transparent);
        border-radius: 12px;
        padding: 0.9rem;
        display: grid;
        grid-template-rows: auto 1fr;
        gap: 0.75rem;
        height: 320px;
      }

      .chart-height-md {
        height: 320px;
      }

      .chart-height-lg {
        height: 420px;
      }

      .chart-title {
        margin: 0;
        font-size: 0.95rem;
        color: var(--text);
      }

      .chart-card canvas {
        width: 100%;
        height: 100%;
        min-height: 0;
      }

      .chart-error {
        margin: 0;
        color: var(--muted);
        font-size: 0.9rem;
        line-height: 1.45;
      }

      .tabs {
        margin-top: 1.75rem;
      }

      .tab-list {
        display: flex;
        flex-wrap: wrap;
        gap: 0.55rem;
      }

      .tab-button {
        background: color-mix(in srgb, var(--surface) 90%, var(--bg));
        color: var(--text);
        border: 1px solid color-mix(in srgb, var(--primary) 20%, transparent);
      }

      .tab-button[aria-selected='true'] {
        background: var(--primary);
        color: #fff;
        border-color: var(--primary);
      }

      #tabContent {
        margin-top: 0.9rem;
      }

      dialog {
        border: none;
        border-radius: 16px;
        width: min(460px, 92vw);
        padding: 0;
        background: var(--surface);
        color: var(--text);
      }

      dialog::backdrop {
        background: var(--overlay);
      }

      .modal-content {
        padding: 1.25rem 1.25rem 1rem;
      }

      .modal-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 1rem;
      }

      .modal-header h2 {
        margin: 0;
        font-size: 1.1rem;
      }

      .close-btn {
        background: transparent;
        color: var(--muted);
        border: 1px solid color-mix(in srgb, var(--muted) 35%, transparent);
      }

      .theme-group {
        margin-top: 1rem;
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 0.7rem;
      }

      .theme-btn[data-selected='true'] {
        outline: 3px solid color-mix(in srgb, var(--primary) 40%, transparent);
      }

      .note {
        margin-top: 1rem;
        font-size: 0.85rem;
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Ecommerce Dashboard</h1>
      <p>Dashboard for insights and KPIs specific to ecommerce.</p>
      <div class="actions">
        <button id="aboutButton" class="about-btn" type="button">About</button>
      </div>

      <section class="tabs" aria-label="Dashboard views">
        <div id="tabList" class="tab-list" role="tablist" aria-label="Dashboard tabs">
          <button id="tab-home" class="tab-button" type="button" role="tab" aria-selected="true" aria-controls="tabContent" data-tab="home">home</button>
          <button id="tab-revenueOverTime" class="tab-button" type="button" role="tab" aria-selected="false" aria-controls="tabContent" data-tab="revenueOverTime">revenueOverTime</button>
          <button id="tab-ordersOverTime" class="tab-button" type="button" role="tab" aria-selected="false" aria-controls="tabContent" data-tab="ordersOverTime">ordersOverTime</button>
          <button id="tab-orderValueOverTime" class="tab-button" type="button" role="tab" aria-selected="false" aria-controls="tabContent" data-tab="orderValueOverTime">orderValueOverTime</button>
          <button id="tab-geographyRevenue" class="tab-button" type="button" role="tab" aria-selected="false" aria-controls="tabContent" data-tab="geographyRevenue">geographyRevenue</button>
          <button id="tab-geographyCustomers" class="tab-button" type="button" role="tab" aria-selected="false" aria-controls="tabContent" data-tab="geographyCustomers">geographyCustomers</button>
          <button id="tab-paymentMethodRevenue" class="tab-button" type="button" role="tab" aria-selected="false" aria-controls="tabContent" data-tab="paymentMethodRevenue">paymentMethodRevenue</button>
          <button id="tab-bestSellers" class="tab-button" type="button" role="tab" aria-selected="false" aria-controls="tabContent" data-tab="bestSellers">bestSellers</button>
          <button id="tab-abandonedCartRecovery" class="tab-button" type="button" role="tab" aria-selected="false" aria-controls="tabContent" data-tab="abandonedCartRecovery">abandonedCartRecovery</button>
          <button id="tab-productQualityRevenue" class="tab-button" type="button" role="tab" aria-selected="false" aria-controls="tabContent" data-tab="productQualityRevenue">productQualityRevenue</button>
        </div>
      </section>

      <p id="protocolWarning" class="chart-error" hidden></p>
      <div id="tabContent" role="tabpanel" aria-labelledby="tab-home"></div>
    </main>

    <dialog id="aboutModal" aria-labelledby="aboutTitle">
      <div class="modal-content">
        <div class="modal-header">
          <h2 id="aboutTitle">About & Theme</h2>
          <button id="closeModal" class="close-btn" type="button" aria-label="Close">✕</button>
        </div>
        <p style="margin-top: 0.6rem">Choose your preferred theme:</p>
        <div class="theme-group" role="group" aria-label="Theme selection">
          <button class="theme-btn" data-theme-option="auto" type="button">Auto</button>
          <button class="theme-btn" data-theme-option="dark" type="button">Dark</button>
          <button class="theme-btn" data-theme-option="light" type="button">Light</button>
        </div>
        <p class="note">Saved in localStorage as <code>themePreference</code>.</p>
      </div>
    </dialog>

    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0"></script>

    <script>
      const CHART_CONFIGS = [
        {
          id: 'revenueOverTime',
          title: 'Revenue Over Time',
          csvPath: 'analysis/exports/CSVs/01_01_revenue_over_time.csv',
          type: 'line',
          xKey: 'revenue_month',
          yKey: 'revenue'
        },
        {
          id: 'ordersOverTime',
          title: 'Orders Over Time',
          csvPath: 'analysis/exports/CSVs/01_02_orders_over_time.csv',
          type: 'bar',
          xKey: 'order_month',
          yKey: 'total_orders'
        },
        {
          id: 'orderValueOverTime',
          title: 'Average Order Value Over Time',
          csvPath: 'analysis/exports/CSVs/01_03_order_value_over_time.csv',
          type: 'line',
          xKey: 'order_month',
          yKey: 'average_order_value'
        },
        {
          id: 'geographyRevenue',
          title: 'Revenue by Geography',
          csvPath: 'analysis/exports/CSVs/01_04_geography_revenue.csv',
          type: 'bar',
          xKey: 'city',
          yKey: 'total_revenue'
        },
        {
          id: 'geographyCustomers',
          title: 'Customers by Country',
          csvPath: 'analysis/exports/CSVs/01_05_geography_customers.csv',
          type: 'bar',
          xKey: 'country',
          yKey: 'number_of_customers'
        },
        {
          id: 'paymentMethodRevenue',
          title: 'Revenue by Payment Method',
          csvPath: 'analysis/exports/CSVs/01_06_payment_method_revenue.csv',
          type: 'line',
          xKey: 'order_month',
          yKey: 'revenue'
        },
        {
          id: 'bestSellers',
          title: 'Best Sellers',
          csvPath: 'analysis/exports/CSVs/01_07_best_sellers.csv',
          type: 'bar',
          xKey: 'product_name',
          yKey: 'total_units_sold'
        },
        {
          id: 'abandonedCartRecovery',
          title: 'Abandoned Cart Recovery',
          csvPath: 'analysis/exports/CSVs/01_08_abandoned_cart_recovery.csv',
          type: 'bar',
          xKey: 'traffic_source',
          yKey: 'cart_recovery_rate'
        },
        {
          id: 'productQualityRevenue',
          title: 'Product Quality vs Revenue',
          csvPath: 'analysis/exports/CSVs/01_09_product_quality_revenue.csv',
          type: 'bar',
          xKey: 'product_name',
          yKey: 'item_revenue'
        }
      ];

      const TAB_VIEWS = {
        revenueOverTime: { id: 'revenueOverTime', title: 'Revenue Over Time', csvPath: 'analysis/exports/CSVs/01_01_revenue_over_time.csv', chartType: 'line', xKey: 'revenue_month', yKey: 'revenue', horizontalBarLike: false, maxLabels: 24, heightClass: 'chart-height-md', axisTickFormat: 'currency', fillArea: true, lineTension: 0.35, reduceTickLabels: true },
        ordersOverTime: { id: 'ordersOverTime', title: 'Orders Over Time', csvPath: 'analysis/exports/CSVs/01_02_orders_over_time.csv', chartType: 'bar', xKey: 'order_month', yKey: 'total_orders', horizontalBarLike: false, maxLabels: 24, heightClass: 'chart-height-md', axisTickFormat: 'number', reduceTickLabels: true, integerYAxis: true },
        orderValueOverTime: { id: 'orderValueOverTime', title: 'Average Order Value Over Time', csvPath: 'analysis/exports/CSVs/01_03_order_value_over_time.csv', chartType: 'line', xKey: 'order_month', yKey: 'average_order_value', horizontalBarLike: false, maxLabels: 24, heightClass: 'chart-height-md', axisTickFormat: 'currency', movingAverageWindow: 3 },
        geographyRevenue: { id: 'geographyRevenue', title: 'Revenue by Geography', csvPath: 'analysis/exports/CSVs/01_04_geography_revenue.csv', chartType: 'bar', xKey: 'city', yKey: 'total_revenue', horizontalBarLike: true, maxLabels: 12, heightClass: 'chart-height-lg', axisTickFormat: 'currency', sortBy: 'total_revenue', sortOrder: 'desc' },
        geographyCustomers: { id: 'geographyCustomers', title: 'Customers by Country', csvPath: 'analysis/exports/CSVs/01_05_geography_customers.csv', chartType: 'bar', xKey: 'country', yKey: 'number_of_customers', horizontalBarLike: true, maxLabels: 12, heightClass: 'chart-height-lg', axisTickFormat: 'number', sortBy: 'number_of_customers', sortOrder: 'desc', integerYAxis: true, tooltipValueFormat: 'compact' },
        paymentMethodRevenue: { id: 'paymentMethodRevenue', title: 'Revenue by Payment Method', csvPath: 'analysis/exports/CSVs/01_06_payment_method_revenue.csv', chartType: 'bar', xKey: 'order_month', yKey: 'revenue', seriesKey: 'payment_method', horizontalBarLike: false, maxLabels: 36, heightClass: 'chart-height-md', axisTickFormat: 'currency', forceLegend: true },
        bestSellers: { id: 'bestSellers', title: 'Best Sellers', csvPath: 'analysis/exports/CSVs/01_07_best_sellers.csv', chartType: 'bar', xKey: 'product_name', yKey: 'total_units_sold', horizontalBarLike: true, maxLabels: 15, heightClass: 'chart-height-lg', axisTickFormat: 'number', integerYAxis: true, tooltipValueFormat: 'integer', sortBy: 'total_units_sold', sortOrder: 'desc', showDataLabels: true },
        abandonedCartRecovery: { id: 'abandonedCartRecovery', title: 'Abandoned Cart Recovery', csvPath: 'analysis/exports/CSVs/01_08_abandoned_cart_recovery.csv', chartType: 'bar', xKey: 'traffic_source', yKey: 'cart_recovery_rate', horizontalBarLike: false, maxLabels: 20, heightClass: 'chart-height-md', axisTickFormat: 'percent', percentScale: 'auto' },
        productQualityRevenue: { id: 'productQualityRevenue', title: 'Product Quality vs Revenue', csvPath: 'analysis/exports/CSVs/01_09_product_quality_revenue.csv', chartType: 'scatter', xKey: 'avg_rating', yKey: 'item_revenue', labelKey: 'product_name', sortBy: 'item_revenue', sortOrder: 'desc', maxLabels: 20, heightClass: 'chart-height-lg', axisTickFormat: 'currency', xAxisTickFormat: 'number', xAxisTitle: 'Quality Score (Average Rating)', yAxisTitle: 'Item Revenue (USD)' }
      };

      const STORAGE_KEY = 'themePreference';
      const root = document.documentElement;
      const modal = document.getElementById('aboutModal');
      const aboutButton = document.getElementById('aboutButton');
      const closeModalButton = document.getElementById('closeModal');
      const themeButtons = Array.from(document.querySelectorAll('.theme-btn[data-theme-option]'));
      let activeChart = null;
      let activeTabId = 'home';
      let tabRenderVersion = 0;

      if (window.ChartDataLabels) {
        Chart.register(window.ChartDataLabels);
      }

      function getSystemTheme() {
        return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      }

      function getStoredTheme() {
        return localStorage.getItem(STORAGE_KEY) || 'auto';
      }

      function applyTheme(themeChoice) {
        const resolvedTheme = themeChoice === 'auto' ? getSystemTheme() : themeChoice;
        root.setAttribute('data-theme', resolvedTheme);

        themeButtons.forEach((button) => {
          button.dataset.selected = String(button.dataset.themeOption === themeChoice);
        });
      }

      function setTheme(themeChoice) {
        localStorage.setItem(STORAGE_KEY, themeChoice);
        applyTheme(themeChoice);
      }



      function showProtocolWarning() {
        if (window.location.protocol === 'file:') {
          const warning = document.getElementById('protocolWarning');
          warning.hidden = false;
          warning.textContent =
            'You are viewing this page with file://. CSV fetch requests may fail; run `python -m http.server 8000` from the repo root and open http://localhost:8000/index.html instead.';
        }
      }

      async function loadCsvRows(csvPath) {
        const response = await fetch(csvPath);
        if (!response.ok) {
          throw new Error(`Failed to load CSV: ${csvPath} (${response.status} ${response.statusText})`);
        }

        const csvText = await response.text();
        const parseResult = Papa.parse(csvText, {
          header: true,
          dynamicTyping: true,
          skipEmptyLines: true
        });

        if (parseResult.errors && parseResult.errors.length > 0) {
          throw new Error(`Failed to parse CSV: ${csvPath} (${parseResult.errors[0].message})`);
        }

        return parseResult.data;
      }

      function createChartCard(container, config) {
        const card = document.createElement('article');
        card.className = `chart-card ${config.heightClass || ''}`.trim();

        const title = document.createElement('h3');
        title.className = 'chart-title';
        title.textContent = config.title;

        const canvas = document.createElement('canvas');
        canvas.id = `${config.id}Chart`;

        card.append(title, canvas);
        container.append(card);

        return canvas;
      }

      function renderErrorCard(container, title, message) {
        const card = document.createElement('article');
        card.className = 'chart-card';

        const cardTitle = document.createElement('h3');
        cardTitle.className = 'chart-title';
        cardTitle.textContent = title;

        const errorMessage = document.createElement('p');
        errorMessage.className = 'chart-error';
        errorMessage.textContent = message;

        card.append(cardTitle, errorMessage);
        container.append(card);
      }

      function resolvePercentScale(config, rows) {
        if (config.axisTickFormat !== 'percent') return null;
        if (config.percentScale === 'fraction' || config.percentScale === 'whole') return config.percentScale;

        const numericValues = rows
          .map((row) => Number(row[config.yKey]))
          .filter((value) => Number.isFinite(value));

        if (numericValues.length === 0) return 'fraction';
        const maxValue = Math.max(...numericValues);
        return maxValue > 1 ? 'whole' : 'fraction';
      }

      function formatTickValue(value, axisTickFormat, percentScale = 'fraction') {
        if (axisTickFormat === 'currency') return Number(value).toLocaleString('en-US', { style: 'currency', currency: 'USD', maximumFractionDigits: 0 });
        if (axisTickFormat === 'percent') {
          const numericValue = Number(value);
          const percentValue = percentScale === 'whole' ? numericValue : numericValue * 100;
          return `${percentValue.toFixed(0)}%`;
        }
        return Number(value).toLocaleString();
      }

      function formatTooltipValue(value, formatType, axisTickFormat, percentScale = 'fraction') {
        if (formatType === 'compact') {
          return Number(value).toLocaleString('en-US', { notation: 'compact', maximumFractionDigits: 1 });
        }
        if (formatType === 'integer') {
          return Math.round(Number(value)).toLocaleString('en-US');
        }
        return formatTickValue(value, axisTickFormat, percentScale);
      }

      function computeMovingAverage(values, windowSize) {
        if (!Number.isInteger(windowSize) || windowSize <= 1) {
          return [];
        }

        return values.map((_, index) => {
          if (index < windowSize - 1) {
            return null;
          }
          const windowValues = values.slice(index - windowSize + 1, index + 1).map((value) => Number(value));
          const average = windowValues.reduce((sum, value) => sum + value, 0) / windowValues.length;
          return Number.isFinite(average) ? average : null;
        });
      }

      function parseYearMonthKey(value) {
        if (typeof value !== 'string') return null;
        const match = value.match(/^(\d{4})-(\d{2})$/);
        if (!match) return null;

        const year = Number(match[1]);
        const month = Number(match[2]);
        if (!Number.isInteger(year) || !Number.isInteger(month) || month < 1 || month > 12) {
          return null;
        }

        return year * 100 + month;
      }

      async function renderSingleChart(container, config) {
        try {
          const rows = await loadCsvRows(config.csvPath);
          const percentScale = resolvePercentScale(config, rows);
          const isTimeSeries = config.id === 'revenueOverTime';
          const sortedRows = config.sortBy
            ? [...rows].sort((a, b) => {
                const left = Number(a[config.sortBy]);
                const right = Number(b[config.sortBy]);
                const direction = config.sortOrder === 'asc' ? 1 : -1;
                return (left - right) * direction;
              })
            : isTimeSeries
            ? [...rows].sort((a, b) => {
                const left = parseYearMonthKey(a.revenue_month);
                const right = parseYearMonthKey(b.revenue_month);
                if (left === null && right === null) return 0;
                if (left === null) return 1;
                if (right === null) return -1;
                return left - right;
              })
            : rows;
          const limitedRows = Number.isFinite(config.maxLabels) ? sortedRows.slice(0, config.maxLabels) : sortedRows;
          const labels = [...new Set(limitedRows.map((row) => row[config.xKey]))];
          const canvas = createChartCard(container, config);
          const shouldReduceRevenueMonthTicks = config.id === 'revenueOverTime' && labels.length > 12;
          const revenueTickStep = !shouldReduceRevenueMonthTicks ? 1 : labels.length > 24 ? 3 : labels.length > 18 ? 3 : 2;
          const shouldRotateLabels = Boolean(config.reduceTickLabels && labels.length > 24);

          const palette = ['#1769ff', '#00acc1', '#5e35b1', '#43a047', '#ef6c00', '#e53935', '#3949ab', '#00897b'];
          let datasets;
          let values = [];

          if (config.chartType === 'scatter') {
            const scatterPoints = limitedRows.map((row) => ({
              x: Number(row[config.xKey]),
              y: Number(row[config.yKey]),
              label: String(row[config.labelKey || config.xKey])
            })).filter((point) => Number.isFinite(point.x) && Number.isFinite(point.y));
            datasets = [
              {
                label: config.title,
                data: scatterPoints,
                borderColor: '#1769ff',
                backgroundColor: 'rgba(23, 105, 255, 0.55)',
                pointRadius: 6,
                pointHoverRadius: 8,
                showLine: false
              }
            ];
          } else if (config.seriesKey) {
            const seriesNames = [...new Set(limitedRows.map((row) => row[config.seriesKey]))];
            datasets = seriesNames.map((seriesName, index) => {
              const color = palette[index % palette.length];
              const byLabel = new Map(
                limitedRows
                  .filter((row) => row[config.seriesKey] === seriesName)
                  .map((row) => [row[config.xKey], Number(row[config.yKey])])
              );

              return {
                label: String(seriesName),
                data: labels.map((label) => byLabel.get(label) ?? null),
                borderColor: color,
                backgroundColor: `${color}66`,
                borderWidth: 2,
                tension: Number.isFinite(config.lineTension) ? config.lineTension : 0.25,
                fill: false
              };
            });
          } else {
            values = limitedRows.map((row) => row[config.yKey]);
            datasets = [
              {
                label: config.title,
                data: values,
                borderColor: '#1769ff',
                backgroundColor: 'rgba(23, 105, 255, 0.28)',
                borderWidth: 2,
                tension: Number.isFinite(config.lineTension) ? config.lineTension : 0.25,
                fill: config.chartType === 'line' ? Boolean(config.fillArea) : false
              }
            ];
          }

          if (!config.seriesKey && config.chartType === 'line' && Number.isInteger(config.movingAverageWindow) && config.movingAverageWindow > 1) {
            const movingAverage = computeMovingAverage(values, config.movingAverageWindow);
            datasets.push({
              label: `${config.movingAverageWindow}-Month Moving Average`,
              data: movingAverage,
              borderColor: 'rgba(23, 105, 255, 0.7)',
              borderWidth: 1.5,
              borderDash: [6, 4],
              pointRadius: 0,
              pointHoverRadius: 3,
              tension: 0.25,
              fill: false
            });
          }

          const chartInstance = new Chart(canvas.getContext('2d'), {
            type: config.chartType,
            data: {
              labels,
              datasets
            },
            options: {
              responsive: true,
              maintainAspectRatio: false,
              plugins: {
                legend: {
                  display: Boolean(config.forceLegend) || datasets.length > 1
                },
                datalabels: {
                  display: Boolean(config.showDataLabels) || config.chartType === 'scatter',
                  align: 'top',
                  anchor: 'end',
                  offset: 6,
                  color: '#0f2b5b',
                  formatter(value) {
                    if (config.chartType === 'scatter') {
                      return value.label;
                    }
                    return Math.round(Number(value)).toLocaleString('en-US');
                  }
                },
                tooltip: {
                  callbacks: {
                    title(context) {
                      if (!Array.isArray(context) || context.length === 0) {
                        return '';
                      }
                      const dataIndex = context[0].dataIndex;
                      return labels[dataIndex] ?? context[0].label ?? '';
                    },
                    label(context) {
                      const label = context.dataset.label ? `${context.dataset.label}: ` : '';
                      if (config.chartType === 'scatter') {
                        const point = context.raw;
                        const xVal = formatTooltipValue(point.x, config.tooltipValueFormat, config.xAxisTickFormat || 'number', percentScale || 'fraction');
                        const yVal = formatTooltipValue(point.y, config.tooltipValueFormat, config.axisTickFormat, percentScale || 'fraction');
                        return `${point.label}: ${config.xAxisTitle || config.xKey} ${xVal}, ${config.yAxisTitle || config.yKey} ${yVal}`;
                      }
                      const value = config.horizontalBarLike ? context.parsed.x : context.parsed.y;
                      return `${label}${formatTooltipValue(value, config.tooltipValueFormat, config.axisTickFormat, percentScale || 'fraction')}`;
                    }
                  }
                }
              },
              indexAxis: config.horizontalBarLike ? 'y' : 'x',
              scales: {
                x: {
                  title: {
                    display: Boolean(config.xAxisTitle),
                    text: config.xAxisTitle || ''
                  },
                  ticks: {
                    autoSkip: true,
                    maxTicksLimit: shouldRotateLabels ? 12 : undefined,
                    minRotation: shouldRotateLabels ? 45 : 0,
                    maxRotation: shouldRotateLabels ? 60 : 0,
                    callback(value, index) {
                      if (config.chartType === 'scatter') {
                        return formatTickValue(value, config.xAxisTickFormat || 'number', percentScale || 'fraction');
                      }
                      if (shouldReduceRevenueMonthTicks && index % revenueTickStep !== 0) {
                        return '';
                      }
                      return labels[index] ?? value;
                    }
                  }
                },
                y: {
                  title: {
                    display: Boolean(config.yAxisTitle),
                    text: config.yAxisTitle || ''
                  },
                  beginAtZero: config.chartType !== 'scatter',
                  max: config.axisTickFormat === 'percent' ? (percentScale === 'whole' ? 100 : 1) : undefined,
                  ticks: {
                    precision: config.integerYAxis ? 0 : undefined,
                    callback(value) {
                      if (config.integerYAxis && !Number.isInteger(Number(value))) {
                        return '';
                      }
                      const yAxisFormat = config.axisTickFormat;
                      return formatTickValue(value, yAxisFormat, percentScale || 'fraction');
                    }
                  }
                }
              }
            }
          });

          return chartInstance;
        } catch (error) {
          const message = error instanceof Error ? error.message : String(error);
          console.error(`Failed to render chart "${config.title}":`, error);
          renderErrorCard(container, config.title, `Could not render chart: ${message}`);
          return null;
        }
      }

      function initializeTabs() {
        const tabButtons = Array.from(document.querySelectorAll('.tab-button[role="tab"]'));

        async function activateTab(tabId) {
          const renderVersion = ++tabRenderVersion;
          activeTabId = tabId;

          if (activeChart) {
            activeChart.destroy();
            activeChart = null;
          }

          const panel = document.getElementById('tabContent');
          panel.textContent = '';

          const activeButton = tabButtons.find((button) => button.dataset.tab === tabId);
          if (!activeButton) {
            return;
          }

          tabButtons.forEach((button) => {
            const isActive = button === activeButton;
            button.setAttribute('aria-selected', String(isActive));
            button.tabIndex = isActive ? 0 : -1;
          });

          panel.setAttribute('aria-labelledby', activeButton.id);

          if (tabId === 'home') {
            const summary = document.createElement('p');
            summary.className = 'chart-error';
            summary.textContent = 'Select a tab to view an individual analytics chart.';
            panel.append(summary);
            return;
          }

          const config = TAB_VIEWS[tabId];
          if (!config) {
            renderErrorCard(panel, 'Unknown tab', `No tab view configuration found for "${tabId}".`);
            return;
          }

          const chartInstance = await renderSingleChart(panel, config);
          if (renderVersion !== tabRenderVersion || activeTabId !== tabId) {
            if (chartInstance) {
              chartInstance.destroy();
            }
            panel.textContent = '';
            return;
          }
          activeChart = chartInstance;
        }

        tabButtons.forEach((button) => {
          button.addEventListener('click', () => {
            activateTab(button.dataset.tab);
          });
        });

        activateTab('home').catch((error) => {
          console.error('Failed to render initial tab content:', error);
        });
      }

      aboutButton.addEventListener('click', () => {
        modal.showModal();
      });

      closeModalButton.addEventListener('click', () => {
        modal.close();
      });

      modal.addEventListener('click', (event) => {
        const rect = modal.getBoundingClientRect();
        const inside =
          event.clientX >= rect.left &&
          event.clientX <= rect.right &&
          event.clientY >= rect.top &&
          event.clientY <= rect.bottom;

        if (!inside) {
          modal.close();
        }
      });

      themeButtons.forEach((button) => {
        button.addEventListener('click', () => {
          setTheme(button.dataset.themeOption);
        });
      });

      window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
        if (getStoredTheme() === 'auto') {
          applyTheme('auto');
        }
      });

      showProtocolWarning();
      applyTheme(getStoredTheme());
      initializeTabs();
    </script>
  </body>
</html>
